<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex - Pokemón API</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>Pokédex</h1>
    </header>

    <main>
        <section>
            <h2>Buscar Pokémon</h2>
            <input type="text" id="pokemon-name" placeholder="Ingrese un pokémon">

            <button id="btn-search">Buscar</button>

            <article id="resultado">

            </article>

            <button id="btn-favorite">Guardar favorito</button>
        </section>

        <section>
            <h2>Favoritos</h2>
            <button id="btn-clear-all">Borrar todos</button>
            <ul id="favoritos">

            </ul>
        </section>
    </main>
   <script src="app.js"></script>
</body>

</html>
